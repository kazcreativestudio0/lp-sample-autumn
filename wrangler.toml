# Cloudflare Pages（静的サイト）
#
# ▼ GitHub 連携だけでデプロイする場合（ダッシュボード）
#   Workers & Pages → Create → Pages → Connect to Git
#   Repository: kazcreativestudio0/lp-sample-autumn
#   Production branch: main
#   Framework preset: Vite（または None）
#   Build command: npm run build
#   Build output directory: dist
#   Root directory: /（リポジトリルート）
#   環境変数（推奨）: NODE_VERSION = 20  ← .nvmrc と package.json engines と揃える
#
# GitHub Actions 経由のデプロイは二重になるため、.github/workflows は
# cloudflare-pages.yml.disabled のままにしてください。
#
# wrangler pages deploy でも project 名として参照されます。
name = "lp-sample-autumn"
compatibility_date = "2026-04-19"
pages_build_output_dir = "./dist"
